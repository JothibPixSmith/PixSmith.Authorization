<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthServer</title>
    <base href="/" />
    <!-- Tailwind CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
        /* Custom utility classes matching Tailwind naming */
        .btn-primary {
            @apply bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition disabled:opacity-50;
        }
        .btn-secondary {
            @apply bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Shown while Blazor loads -->
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;">
            <div style="font-size:3rem">🔐</div>
            <div style="color:#3b82f6;font-weight:700;font-size:1.5rem">AuthServer</div>
            <div style="color:#6b7280;font-size:.875rem">Loading&hellip;</div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
